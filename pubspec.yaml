name: moodytoy
description: Dating app with Bluetooth keyfob
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Backend
  supabase_flutter: ^2.3.0

  # BLE
  flutter_blue_plus: ^1.29.5

  # GPS
  geolocator: ^11.0.0

  # Photos
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Permissions
  permission_handler: ^11.3.1

  # Biometrics (mock for MVP)
  local_auth: ^2.1.8

  # HTTP
  dio: ^5.4.3

  # Storage
  shared_preferences: ^2.2.3

  # Notifications

  # Utils
  intl: ^0.19.0
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  timeago: ^3.6.1
  flutter_dotenv: ^5.1.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
