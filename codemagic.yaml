workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Regenerate iOS project
        script: |
          rm -rf ios/Runner.xcodeproj ios/Runner.xcworkspace ios/Podfile.lock ios/Pods
          flutter create --platforms=ios --org com.moodytoy .
          flutter pub get

      - name: Set iOS deployment target to 14.0
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile

      - name: Pod install
        script: cd ios && pod install --repo-update

      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app

  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/**/*.apk
