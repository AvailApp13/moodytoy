workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Regenerate iOS project
        script: |
          rm -rf ios/Runner.xcodeproj ios/Runner.xcworkspace ios/Podfile.lock ios/Pods
          flutter create --platforms=ios --org com.moodytoy .
          flutter pub get

      - name: Set iOS deployment target to 14.0
        script: |
          # Исправить минимальную версию iOS в проекте
          find ios -name "project.pbxproj" -exec \
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' {} \;
          find ios -name "project.pbxproj" -exec \
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' {} \;
          # Исправить Podfile
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '14.0'/" ios/Podfile
          # Добавить NSBonjourServices и NSLocalNetworkUsageDescription в Info.plist
          plutil -insert NSBonjourServices -array ios/Runner/Info.plist 2>/dev/null || true
          plutil -insert NSLocalNetworkUsageDescription \
            -string "Нужен для поиска Bluetooth-брелока в локальной сети" \
            ios/Runner/Info.plist 2>/dev/null || true

      - name: Pod install
        script: cd ios && pod install --repo-update

      - name: Build iOS simulator
        script: flutter build ios --simulator --debug

    artifacts:
      - build/ios/iphonesimulator/*.app

  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/**/*.apk
