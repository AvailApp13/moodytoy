workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: 16.2
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moodytoy.app
        certificate_name: MoodyToy AppStore
        provisioning_profile_name: moodytoy_appstore
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Regenerate iOS project
        script: |
          rm -rf ios/Runner.xcodeproj ios/Runner.xcworkspace ios/Podfile.lock ios/Pods
          flutter create --platforms=ios --org com.moodytoy .
          flutter pub get
      - name: Set iOS deployment target to 14.0
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile
      - name: Pod install
        script: cd ios && pod install --repo-update
      - name: Build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: QB9G5729CH
        key_id: QB9G5729CH
        issuer_id: 69a6de82-0693-47e3-e053-5b8c7c11a4d1
        submit_to_testflight: true
