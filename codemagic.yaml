workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moodytoy.app
      groups:
        - moodytoy

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Recreate iOS project
        script: |
          cp ios/Runner/Info.plist /tmp/Info.plist
          cp ios/Flutter/AppFrameworkInfo.plist /tmp/AppFrameworkInfo.plist
          rm -rf ios/
          flutter create --platforms=ios --org com.moodytoy --project-name app .
          cp /tmp/Info.plist ios/Runner/Info.plist
          cp /tmp/AppFrameworkInfo.plist ios/Flutter/AppFrameworkInfo.plist
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = F2MD3735EJ;/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile

      - name: Apply code signing
        script: xcode-project use-profiles

      - name: Pod install
        script: cd ios && pod install --repo-update

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=$HOME/export_options.plist

      - name: Package IPA into ZIP
        script: |
          mkdir -p build/output
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" build/output/moodytoy.ipa
            cd build/output
            zip moodytoy_release.zip moodytoy.ipa
            echo "ZIP created: moodytoy_release.zip"
          fi

    artifacts:
      - build/output/moodytoy_release.zip
      - build/output/moodytoy.ipa
      - build/ios/ipa/*.ipa
