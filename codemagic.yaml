workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Regenerate iOS project
        script: |
          rm -rf ios/Runner.xcodeproj ios/Runner.xcworkspace ios/Podfile.lock ios/Pods
          flutter create --platforms=ios --org com.moodytoy .
          flutter pub get
      - name: Pod install
        script: cd ios && pod install --repo-update
      - name: Build iOS simulator
        script: flutter build ios --simulator --debug
    artifacts:
      - build/ios/iphonesimulator/*.app
