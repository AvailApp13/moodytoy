workflows:
  ios-build:
    name: iOS Build IPA
    max_build_duration: 60
    environment:
      flutter: 3.27.4
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moodytoy.app
      groups:
        - moodytoy
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Regenerate iOS project
        script: |
          rm -rf ios/Runner.xcodeproj ios/Runner.xcworkspace ios/Podfile.lock ios/Pods
          flutter create --platforms=ios --org com.moodytoy --project-name app .
          flutter pub get

      - name: Fix project settings
        script: |
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.moodytoy.clone;/PRODUCT_BUNDLE_IDENTIFIER = com.moodytoy.app;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.moodytoy.app.clone;/PRODUCT_BUNDLE_IDENTIFIER = com.moodytoy.app;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = F2MD3735EJ;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile

      - name: Apply code signing
        script: xcode-project use-profiles

      - name: Pod install
        script: cd ios && pod install --repo-update

      - name: Build Flutter (no codesign)
        script: flutter build ios --release --no-codesign

      - name: Patch App.framework Info.plist
        script: |
          # Найти App.framework который будет скопирован в архив
          APP_FRAMEWORK="build/ios/Release-iphoneos/App.framework"
          PLIST="$APP_FRAMEWORK/Info.plist"
          
          echo "Checking: $PLIST"
          ls -la "$APP_FRAMEWORK" || echo "Not found at expected path"
          
          # Найти все App.framework
          find build -name "App.framework" -type d 2>/dev/null
          
          # Патчим все найденные
          find build -path "*/App.framework/Info.plist" | while read plist; do
            echo "Patching: $plist"
            /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.moodytoy.app" "$plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.moodytoy.app" "$plist"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist"
          done

      - name: Archive and export IPA
        script: |
          # Архивируем (используем уже собранный Flutter код)
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            DEVELOPMENT_TEAM=F2MD3735EJ \
            PRODUCT_BUNDLE_IDENTIFIER=com.moodytoy.app \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates \
            | xcpretty
          
          # Экспортируем IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist $HOME/export_options.plist \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
