workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moodytoy.app
      groups:
        - moodytoy

    scripts:
      - name: Flutter packages
        script: |
          flutter pub get

      - name: Apply code signing
        script: xcode-project use-profiles

      - name: Pod install
        script: |
          cd ios && pod install --repo-update

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=$HOME/export_options.plist \
            --verbose 2>&1 | tail -50
          
          # Если flutter build ipa не создал IPA из-за App.framework,
          # патчим xcarchive и экспортируем вручную
          ARCHIVE="build/ios/archive/Runner.xcarchive"
          IPA_DIR="build/ios/ipa"
          
          if [ ! -f "$IPA_DIR"/*.ipa ] && [ -d "$ARCHIVE" ]; then
            echo "IPA not found, patching xcarchive..."
            find "$ARCHIVE" -name "App.framework" -type d | while read fw; do
              plist="$fw/Info.plist"
              if [ -f "$plist" ]; then
                echo "Patching: $plist"
                /usr/libexec/PlistBuddy -c "Delete :CFBundleIdentifier" "$plist" 2>/dev/null || true
                /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.moodytoy.app.flutter" "$plist"
                echo "Result: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$plist")"
              fi
            done
            
            mkdir -p "$IPA_DIR"
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE" \
              -exportPath "$IPA_DIR" \
              -exportOptionsPlist $HOME/export_options.plist \
              -allowProvisioningUpdates
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        api_key: QB9G5729CH
        key_id: QB9G5729CH
        issuer_id: 69a6de82-0693-47e3-e053-5b8c7c11a4d1
        submit_to_testflight: true
