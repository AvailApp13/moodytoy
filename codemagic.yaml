workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moodytoy.app
      groups:
        - moodytoy
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Regenerate iOS project
        script: |
          rm -rf ios/Runner.xcodeproj ios/Runner.xcworkspace ios/Podfile.lock ios/Pods
          flutter create --platforms=ios --org com.moodytoy --project-name app .
          flutter pub get

      - name: Fix project settings
        script: |
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.moodytoy.clone;/PRODUCT_BUNDLE_IDENTIFIER = com.moodytoy.app;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.moodytoy.app.clone;/PRODUCT_BUNDLE_IDENTIFIER = com.moodytoy.app;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = F2MD3735EJ;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile

      - name: Apply code signing
        script: xcode-project use-profiles

      - name: Pod install
        script: cd ios && pod install --repo-update

      - name: Build archive with xcodebuild
        script: |
          # Сначала собираем flutter чтобы сгенерировался App.framework
          flutter build ios --release --no-codesign
          
          # Патчим все Info.plist в App.framework
          find ~/Library/Developer/Xcode -name "App.framework" -type d 2>/dev/null | while read f; do
            if [ -f "$f/Info.plist" ]; then
              /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.moodytoy.app" "$f/Info.plist" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.moodytoy.app" "$f/Info.plist"
              echo "Patched: $f/Info.plist"
            fi
          done
          find . -path "*/App.framework/Info.plist" | while read f; do
            /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.moodytoy.app" "$f" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.moodytoy.app" "$f"
            echo "Patched: $f"
          done
          
          # Теперь архивируем
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=F2MD3735EJ \
            PRODUCT_BUNDLE_IDENTIFIER=com.moodytoy.app \
            -allowProvisioningUpdates
          
          # Экспортируем IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist $HOME/export_options.plist \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: QB9G5729CH
        key_id: QB9G5729CH
        issuer_id: 69a6de82-0693-47e3-e053-5b8c7c11a4d1
        submit_to_testflight: true
