workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moodytoy.app
      groups:
        - moodytoy

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Apply code signing
        script: xcode-project use-profiles

      - name: Pod install
        script: cd ios && pod install --repo-update

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=$HOME/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
